<head>
  <meta charset="utf-8" />

  <title>Bead Garden</title>

  <link rel="stylesheet" type="text/css" href="style.css">
  <style>
    @font-face {
      font-family: 'DungGeunMo';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'Dot Matrix';
      src: url('assets/DOTMATRI.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }
  </style>

  <script src="libraries/p5.min.js"></script>
  <script src="src/fontPatch.js"></script>
  <script src="libraries/p5.sound.min.js"></script>
  <script src="libraries/ml5.min.js"></script>
  <script src="libraries/matter.min.js"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDoXjr6IMt_1G40JbZtye7H3LpdWlMZeRg",
      authDomain: "beadgardenv3.firebaseapp.com",
      projectId: "beadgardenv3",
      storageBucket: "beadgardenv3.firebasestorage.app",
      messagingSenderId: "1052006372337",
      appId: "1:1052006372337:web:f56447c5b2a85cf2976a50"
    };
    let db = null;
    let firebaseAuthReadyPromise = Promise.resolve({
      ok: false,
      error: new Error('Firebase is unavailable')
    });

    try {
      if (typeof firebase !== 'undefined') {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        firebaseAuthReadyPromise = firebase.auth().signInAnonymously()
          .then(() => ({ ok: true, error: null }))
          .catch(error => {
            console.warn('[Firebase] Anonymous auth failed; local database will be used:', error);
            return { ok: false, error };
          });
      }
    } catch (err) {
      console.warn('[Firebase] Initialization failed; local database will be used:', err);
      db = null;
      firebaseAuthReadyPromise = Promise.resolve({ ok: false, error: err });
    }
  </script>
</head>
